<div class="botonera-flotante">
  <div class="botonera-contenedor">
    <button
      mat-mini-fab
      color="accent"
      matTooltip="Cargar las ventas"
      (click)="obtenerVentas()"
    >
      <i class="fa-solid fa-arrows-rotate"></i>
    </button>
  </div>
</div>

<div class="card">
  <div class="font-semibold text-xl mb-4">Ventas</div>
  <p-table
    #grillaVentas
    [value]="ventas"
    dataKey="Id"
    [rows]="10"
    [loading]="cargando"
    [rowHover]="true"
    [showGridlines]="true"
    [paginator]="true"
    responsiveLayout="scroll"
  >
    <ng-template #caption>
      <div class="flex flex-wrap items-center gap-2">
        <div class="flex flex-col w-65 gap-0">
          <p-floatlabel variant="in" class="w-full">
            <p-datepicker
              [(ngModel)]="fechasRango"
              inputId="rangoFechas"
              showIcon
              iconDisplay="input"
              selectionMode="range"
              [readonlyInput]="true"
              class="w-full"
            ></p-datepicker>
            <label for="rangoFechas">Rango de fechas</label>
          </p-floatlabel>
        </div>
        <div class="flex flex-col w-65 gap-0">
          <p-floatlabel class="w-full relative" variant="in">
            <p-select
              [(ngModel)]="Usuario"
              inputId="usuario"
              [options]="usuariosCombo"
              optionLabel="Usuario"
              class="w-full"
              variant="filled"
              name="usuario"
              [filter]="true"
              [showClear]="true"
            ></p-select>
            <label for="usuario">Usuario</label>
          </p-floatlabel>
        </div>
        <div class="flex flex-col w-65 gap-0">
          <p-floatlabel class="w-full relative" variant="in">
            <p-select
              [(ngModel)]="Producto"
              inputId="producto"
              [options]="productosCombo"
              optionLabel="Descripcion"
              class="w-full"
              variant="filled"
              name="producto"
              [filter]="true"
              [showClear]="true"
            ></p-select>
            <label for="producto">Producto</label>
          </p-floatlabel>
        </div>
        <div class="flex items-end mt-1">
          <button
            pButton
            type="button"
            label="Buscar"
            icon="pi pi-search"
            class="p-button-outlined"
            (click)="obtenerVentas()"
          ></button>
        </div>
      </div>
    </ng-template>

    <ng-template #header>
      <tr>
        <th style="min-width: 6rem">Código</th>
        <th style="min-width: 12rem">Fecha</th>
        <th style="min-width: 8rem">Cant. Items</th>
        <th style="min-width: 10rem">Total</th>
        <th style="min-width: 10rem">Usuario</th>
      </tr>
    </ng-template>

    @if(!cargando){
    <ng-template #body let-venta>
      <tr class="cursor-pointer" (click)="verDetalle(venta)">
        <td>
          <span class="venta-codigo">#{{ venta.Codigo }}</span>
        </td>
        <td>{{ venta.Fecha | date: 'dd/MM/yyyy HH:mm' }}</td>
        <td>
          <p-badge [value]="venta.Items?.length || 0" severity="secondary" />
        </td>
        <td>{{ venta.Total | currency:'ARS':'symbol':'1.0-0' }}</td>
        <td>{{ buscarUsuarioPorVenta(venta)?.Usuario }}</td>
      </tr>
    </ng-template>
    }

    <ng-template #emptymessage>
      <tr>
        <td colspan="5">No se encontraron ventas.</td>
      </tr>
    </ng-template>
    <ng-template #loadingbody>
      <tr>
        <td colspan="5">Cargando ventas...</td>
      </tr>
    </ng-template>
  </p-table>
</div>
