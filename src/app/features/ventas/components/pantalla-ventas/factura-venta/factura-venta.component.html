<div class="factura-card">
  <div class="factura-header">
    <div class="factura-title-group">
      <div class="factura-icon">
        <i class="pi pi-file-edit"></i>
      </div>
      <div>
        <h2 class="factura-title">Factura de venta</h2>
        <span class="factura-subtitle">Revisá los ítems antes de confirmar</span>
      </div>
    </div>
  </div>

  <app-grilla-productos-seleccionados></app-grilla-productos-seleccionados>

  <div class="factura-footer">
    <button class="btn-confirmar" (click)="finalizarVenta()">
      <i class="pi pi-check-circle"></i>
      Confirmar Venta
    </button>
  </div>
</div>
