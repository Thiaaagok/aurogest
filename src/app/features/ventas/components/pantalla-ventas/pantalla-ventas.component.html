<!-- pantalla-ventas.component.html -->
<div class="ventas-layout">

  <!-- Panel izquierdo: buscador + factura -->
  <div class="ventas-main">

    <!-- Buscador -->
    <div class="search-card">
      <div class="search-header">
        <i class="pi pi-shopping-cart search-icon-title"></i>
        <span class="search-title">Nueva Venta</span>
      </div>
      <div class="relative">
        <p-iconfield iconPosition="left">
          <p-inputicon>
            <i class="pi pi-search"></i>
          </p-inputicon>
          <input
            pInputText
            type="text"
            class="search-input"
            placeholder="Buscar por código o descripción..."
            [(ngModel)]="filtroBusqueda"
            (input)="onInput()"
            (keydown)="onKeyDown($event)"
          />
        </p-iconfield>

        <div *ngIf="mostrarAutocomplete" class="autocomplete-panel">
          <div class="autocomplete-header">
            <span>{{ productos.length }} resultado{{ productos.length !== 1 ? 's' : '' }}</span>
            <span class="autocomplete-hint"><kbd>↑↓</kbd> navegar &nbsp; <kbd>↵↵</kbd> seleccionar</span>
          </div>
          <div
            *ngFor="let prod of productos; let i = index"
            class="autocomplete-item"
            [class.active]="i === indiceSeleccionado"
            (click)="seleccionarProducto(prod)"
          >
            <div class="autocomplete-img-wrap">
              <img
                *ngIf="prod?.Imagenes?.length"
                [src]="apiUrl + '/uploads/producto-imagenes/' + prod.Imagenes[0]"
                class="autocomplete-img"
              />
              <img
                *ngIf="!prod?.Imagenes?.length"
                src="assets/no-imagen.jpg"
                class="autocomplete-img"
              />
            </div>
            <div class="autocomplete-info">
              <span class="autocomplete-nombre">{{ prod.Descripcion }}</span>
              <span class="autocomplete-codigo">
                <i class="pi pi-barcode" style="font-size:.65rem"></i>
                {{ prod.Codigo }}
              </span>
            </div>
            <div class="autocomplete-precio-wrap">
              <span class="autocomplete-precio">${{ prod.PrecioVenta }}</span>
              <span class="autocomplete-add-hint">
                <i class="pi pi-plus-circle"></i>
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <app-factura-venta></app-factura-venta>
  </div>
</div>
