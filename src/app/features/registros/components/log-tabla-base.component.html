<div class="botonera-flotante">
  <div class="botonera-contenedor">
    <button mat-mini-fab color="accent"
      [matTooltip]="'Recargar ' + tituloSeccion"
      (click)="buscar()">
      <i class="fa-solid fa-arrows-rotate"></i>
    </button>
  </div>
</div>

<div class="card">
  <div class="font-semibold text-xl mb-4">{{ tituloSeccion }}</div>

  <p-table
    [value]="logs"
    dataKey="Id"
    [rows]="15"
    [loading]="cargando"
    [rowHover]="true"
    [showGridlines]="true"
    [paginator]="true"
    responsiveLayout="scroll"
  >
    <ng-template #caption>
      <div class="flex flex-wrap items-center gap-2">

        <p-floatlabel variant="in" class="w-65">
          <p-datepicker [(ngModel)]="fechasRango" inputId="rangoFechas"
            showIcon iconDisplay="input" selectionMode="range"
            [readonlyInput]="true" class="w-full" />
          <label for="rangoFechas">Rango de fechas</label>
        </p-floatlabel>

        @if (tiposOpciones.length > 0) {
          <p-floatlabel variant="in" class="w-50">
            <p-select [(ngModel)]="tipoFiltro" inputId="tipo"
              [options]="tiposOpciones" optionLabel="label" optionValue="value"
              class="w-full" [showClear]="true" />
            <label for="tipo">Tipo</label>
          </p-floatlabel>
        }

        <p-floatlabel variant="in" class="w-55">
          <p-select [(ngModel)]="usuarioFiltro" inputId="usuario"
            [options]="usuariosCombo" optionLabel="Usuario"
            class="w-full" [filter]="true" [showClear]="true" />
          <label for="usuario">Usuario</label>
        </p-floatlabel>

        <div class="flex gap-2 mt-1">
          <button pButton label="Buscar" icon="pi pi-search"
            class="p-button-outlined" (click)="buscar()"></button>
          <button pButton label="Limpiar" icon="pi pi-filter-slash"
            class="p-button-outlined p-button-secondary"
            (click)="limpiar()"></button>
        </div>

      </div>
    </ng-template>

    <ng-template #header>
      <tr>
        <th style="min-width: 12rem">Fecha</th>
        <th style="min-width: 11rem">Tipo</th>
        <th style="min-width: 10rem">Usuario</th>
        <th style="min-width: 8rem">IP</th>
        <th>Mensaje</th>
      </tr>
    </ng-template>

    @if (!cargando) {
      <ng-template #body let-log>
        <tr>
          <td>{{ log.Fecha | date: 'dd/MM/yyyy HH:mm:ss' }}</td>
          <td>
            <p-tag [value]="log.Tipo" [severity]="$any(severidadLog(log.Tipo))" />
          </td>
          <td>{{ log.UsuarioNombre ?? '-' }}</td>
          <td>{{ log.Ip ?? '-' }}</td>
          <td>
            <div class="flex items-center gap-2">
              <span>{{ log.Mensaje }}</span>
              @if (log.Detalle) {
                <p-button icon="pi pi-info-circle" variant="text" size="small"
                  [pTooltip]="log.Detalle | json" tooltipPosition="left" />
              }
            </div>
          </td>
        </tr>
      </ng-template>
    }

    <ng-template #emptymessage>
      <tr><td colspan="5">No se encontraron registros.</td></tr>
    </ng-template>
    <ng-template #loadingbody>
      <tr><td colspan="5">Cargando...</td></tr>
    </ng-template>

  </p-table>
</div>
